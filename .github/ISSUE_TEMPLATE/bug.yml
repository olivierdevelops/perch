name: 🐛 Bug report
description: Something doesn't work the way the docs say it should.
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Please include enough detail that the maintainer can reproduce on their own machine — copy-pastable input and exact output go a long way.

  - type: input
    id: version
    attributes:
      label: perch version
      description: Output of `perch --version`
      placeholder: "0.1.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: OS
      options:
        - macOS
        - Linux
        - Windows
        - Other
    validations:
      required: true

  - type: textarea
    id: capy
    attributes:
      label: Minimal commands.capy that reproduces the bug
      description: Shrink to ~10 lines if possible. Avoid project-specific paths.
      render: capy
      placeholder: |
        name "repro"
        command x
            do
                shell "echo hello"
            end
        end
    validations:
      required: true

  - type: input
    id: invocation
    attributes:
      label: How you invoked perch
      placeholder: "perch x"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: What happened
      render: text
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What you expected
      render: text
    validations:
      required: true
