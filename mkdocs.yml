site_name: perch
site_description: A cross-platform command runner that compiles to a single binary
site_url: https://luowensheng.github.io/perch/
repo_url: https://github.com/luowensheng/perch
repo_name: luowensheng/perch
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    # Intentionally NOT enabled:
    #   - navigation.instant  — its SPA-style nav breaks our DOMContentLoaded-based JS
    #     (stats counter, pterm, fanout) on subsequent page visits.
    #   - navigation.tabs     — the secondary tab strip doubles header height and
    #     forces our 11 nav items into a cramped horizontal row.
    - navigation.tracking
    - navigation.top
    - navigation.sections
    - content.code.copy
    - content.code.annotate
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/extra.js

markdown_extensions:
  - admonition
  # Lets markdown — tables, lists, emphasis — render *inside* HTML blocks.
  # Without this, the `<div class="perch-compare-wrap"> | table | …`
  # comparison table on docs/index.md rendered as raw pipes.
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      # Keep the `language-X` class on <code> even for languages Pygments
      # doesn't know (capy / perch). Our extra.js post-processor picks
      # them up and applies syntax highlighting client-side.
      pygments_lang_class: true
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - "📦 Recipes (22 ready-to-run)": recipes.md
  - Getting started: getting-started.md
  - Migrating from shell scripts: migrating-from-shell.md
  - Tutorials:
      - Replace your Makefile: tutorials/01-replace-your-makefile.md
      - Ship a tool: tutorials/02-ship-a-tool.md
      - Cross-platform installer: tutorials/03-cross-platform-installer.md
  - Language reference: language.md
  - Templates, contexts &amp; `--report`: execution-contexts.md
  - Testing (`perch test`): testing.md
  - "🔒 WASM (`wasm_run`)": wasm.md
  - "🔒 WASM walkthroughs": wasm-walkthroughs.md
  - Op catalog: op-reference.md
  - Embedding (`--build`): embedding.md
  - MCP server (AI agents): mcp.md
  - LLM control plane: llm-control-plane.md
  - Sandboxing (design): sandbox.md
  - Editor integration (LSP): lsp.md
  - What perch is for: applications.md
  - FAQ: faq.md
  # ─── deeper claims / design notes (after the reference docs) ───
  - The OS analogy: os-in-a-program.md
  - UX roadmap (design): user-experience.md
  - AI-assisted authoring (design): ai-assisted-authoring.md
