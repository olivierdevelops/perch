site_name: perch
site_description: A cross-platform command runner that compiles to a single binary
site_url: https://luowensheng.github.io/perch/
repo_url: https://github.com/luowensheng/perch
repo_name: luowensheng/perch
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.top
    - content.code.copy
    - content.code.annotate
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/extra.js

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Tutorials:
      - Replace your Makefile: tutorials/01-replace-your-makefile.md
      - Ship a tool: tutorials/02-ship-a-tool.md
      - Cross-platform installer: tutorials/03-cross-platform-installer.md
  - Language reference: language.md
  - Op catalog: op-reference.md
  - Embedding (`--build`): embedding.md
  - MCP server (AI agents): mcp.md
  - Sandboxing (design): sandbox.md
  - Editor integration (LSP): lsp.md
  - What perch is for: applications.md
  - FAQ: faq.md
