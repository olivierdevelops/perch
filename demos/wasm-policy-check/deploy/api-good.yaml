apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  labels:
    team: platform
    env: prod
spec:
  replicas: 3
  template:
    spec:
      containers:
        - name: api
          image: ghcr.io/acme/api:v1.4.2
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 128Mi
